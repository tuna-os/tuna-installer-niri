name: Publish Flatpak
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-oci:
    name: Build Flatpak OCI
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:kde-6.9
      options: --privileged
    steps:
      - uses: actions/checkout@v7
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/org.tunaos.InstallerNiri.json
          cache-key: flatpak-builder-${{ github.sha }}
          build-bundle: false
          upload-artifact: false
      - name: Export OCI
        run: |
          flatpak build-bundle --oci --arch=x86_64 repo tuna-installer-niri.oci org.tunaos.InstallerNiri
      - name: Upload OCI artifact
        uses: actions/upload-artifact@v4
        with:
          name: tuna-installer-niri-oci
          path: tuna-installer-niri.oci/
          retention-days: 1

  publish:
    name: Publish to GHCR
    needs: build-oci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v4
        with:
          name: tuna-installer-niri-oci
          path: tuna-installer-niri.oci
      - name: Push OCI to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | skopeo login ghcr.io -u "${{ github.actor }}" --password-stdin
          skopeo copy oci:tuna-installer-niri.oci docker://ghcr.io/tuna-os/tuna-installer-niri:latest
      - name: Update central index (tuna-os/docs)
        env:
          FLATPAK_INDEX_TOKEN: ${{ secrets.FLATPAK_INDEX_TOKEN }}
        run: |
          git clone --depth 1 \
            https://x-access-token:${FLATPAK_INDEX_TOKEN}@github.com/tuna-os/docs.git \
            index-repo
          pip install requests
          python3 .github/scripts/update-index.py \
            --oci-dir tuna-installer-niri.oci \
            --index-file index-repo/static/flatpak/index/static \
            --repo-name tuna-os/tuna-installer-niri \
            --tags latest
          cd index-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/flatpak/index/static
          if git diff --cached --quiet; then
            echo "No index changes"
          else
            git commit -m "chore(flatpak): update tuna-installer-niri OCI index"
            git pull --rebase origin main
            git push origin main
          fi
